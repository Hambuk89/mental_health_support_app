<!-- Community Category Page -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category }} - Community</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <h1>{{ category }}</h1>
    </div>

    <!-- Messages -->
    <div class="chat-area">
    {% for msg in messages %}
        {% if msg.user_id == session['user_id'] %}
            <!-- Print my messages on left -->
            <div class="bubble my-msg">
                <p>{{ msg.content }}</p>
                <span class="timestamp">{{ msg.timestamp }}</span>
            </div>
        {% else %}
            <!-- Print users messages on right -->
            <div class="bubble other-msg">
                <p>{{ msg.content }}</p>
                <span class="timestamp">{{ msg.timestamp }}</span>
            </div>
        {% endif %}
    {% endfor %}
</div>


    <!-- Message input -->
    <form action="/community/send" method="POST" class="input-area">
        <input type="hidden" name="category" value="{{ category }}">
        <textarea name="content" placeholder="Type your message..." required></textarea>
        <button type="submit">Submit</button>
    </form>

    <!-- Back button -->
    <a href="/community" class="feature-btn">Back to Categories</a>

</div>

</body>
</html>

<!-- Profile Page created by Han -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <h1>PROFILE</h1>
    </div>

    <!-- Profile options -->
    <div class="profile-grid">

        <div class="profile-info"><p>Full Name: {{ user.fullname }}</p></div>
        <div class="profile-info"><p>Age: {{ user.age }}</p></div>
        <div class="profile-info"><p>Gender: {{ user.gender}}</p></div>
        <div class="profile-info"><p>Contact: {{ user.contact}}</p></div>
        <div class="profile-info"><p>Email: {{ user.email}}</p></div>

        <a href="/logout" class="profile-btn link-btn">
            <p>LOG OUT</p>
        </a>

    </div>

    <!-- Back button -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>

</body>
</html>

     ============================================================ -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Journal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">
<div class="mobile-wrapper">

    <!-- ============================================================
         TOP BAR
         ============================================================ -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- ============================================================
         PAGE HEADER
         ============================================================ -->
    <div class="page-header">
        <h1>MOOD JOURNAL</h1>
    </div>

    <!-- ============================================================
         MOOD SELECTION CIRCLE
         Each mood linking to a confirmation page
         ============================================================ -->
    <div class="mood-circle">
        <a href="/confirm-mood/tired" class="mood-box mood1">
            <span class="emoji">😴</span>
            <span class="label">TIRED</span>
        </a>

        <a href="/confirm-mood/happy" class="mood-box mood2">
            <span class="emoji">😄</span>
            <span class="label">HAPPY</span>
        </a>

        <a href="/confirm-mood/sad" class="mood-box mood3">
            <span class="emoji">😢</span>
            <span class="label">SAD</span>
        </a>

        <a href="/confirm-mood/excited" class="mood-box mood4">
            <span class="emoji">🤩</span>
            <span class="label">EXCITED</span>
        </a>

        <a href="/confirm-mood/calm" class="mood-box mood5">
            <span class="emoji">😌</span>
            <span class="label">CALM</span>
        </a>

        <a href="/confirm-mood/angry" class="mood-box mood6">
            <span class="emoji">😡</span>
            <span class="label">ANGRY</span>
        </a>
    </div>

    <!-- ============================================================
         VIEW JOURNAL BUTTON
         ============================================================ -->
    <a href="/my-journal" class="feature-btn">View My Journal</a>

    <!-- ============================================================
         BACK BUTTON
         ============================================================ -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>
</body>
</html>

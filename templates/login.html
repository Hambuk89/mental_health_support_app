<!-- Login Page created by Aki -->
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Login header -->
    <div class="page-header">
        <h1>LOGIN</h1>
    </div>

    <!-- Input fields -->
    <input type="text" class="input-box" placeholder="Username / Email">
    <input type="password" class="input-box" placeholder="Password">

    <!-- Action buttons -->
    <div class="placeholder-action">
        <p>USER LOGIN</p>
    </div>

    <div class="placeholder-action">
        <p>ADMIN LOGIN</p>
    </div>

    <a href="/register" class="placeholder-action link-btn">
        <p>REGISTER / SIGN UP</p>
    </a>

    <!-- Back button -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>

</body>
</html>

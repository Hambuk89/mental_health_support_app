<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">
<div class="mobile-wrapper">

    <!-- ============================================================
         TOP BAR
       ============================================================ -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" 
                 alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>


    <!-- ============================================================
         PAGE HEADER
       ============================================================ -->
    <div class="page-header">
        <h1>{{ title }}</h1>
    </div>


    <!-- ============================================================
         MESSAGE BOX
       ============================================================ -->
    <div class="placeholder-box tall" style="height:auto; padding:20px; text-align:center;">
        <p>{{ message }}</p>
    </div>


    <!-- ============================================================
         CONFIRM BUTTON
       ============================================================ -->
    <form action="{{ confirm_url }}" method="POST" class="comment-form">
        <textarea name="comment" placeholder="Add a comment..." class="comment-box"></textarea>
        <button type="submit" class="feature-btn">{{ confirm_text }}</button>
    </form>

    <!-- ============================================================
         CANCEL BUTTON
       ============================================================ -->
    <a href="{{ cancel_url }}" class="feature-btn">
        Cancel
    </a>

</div>
</body>
</html>

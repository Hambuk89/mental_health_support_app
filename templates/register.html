<!-- Register Page created by Han -->
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Register header -->
    <div class="page-header">
        <h1>REGISTER</h1>
    </div>

    <!-- Input fields -->
    <input type="text" class="input-box" placeholder="Full Name">
    <input type="email" class="input-box" placeholder="Email">
    <input type="password" class="input-box" placeholder="Password">
    <input type="password" class="input-box" placeholder="Confirm Password">

    <!-- Create Account button -->
    <div class="placeholder-action">
        <p>CREATE ACCOUNT</p>
    </div>

    <!-- Back button -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>

</body>
</html>

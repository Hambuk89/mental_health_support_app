<!-- Community Page created by Aki -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Forum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <h1>COMMUNITY CHANNEL</h1>
    </div>

    <!-- Category selection -->
    <div id="category-selection">
        <h3>SELECT A CATEGORY</h3>
        <div class="category-list">
            <button class="category-btn" onclick="openBoard('Life & Workplace Stress')">Life / Workplace Stress</button>
            <button class="category-btn" onclick="openBoard('Mind & Body Symptoms')">Mind / Body Symptoms</button>
            <button class="category-btn" onclick="openBoard('Motivation')">Motivation</button>
            <button class="category-btn" onclick="openBoard('Casual Lounge')">Casual Lounge</button>
        </div>
    </div>

    <!-- Board Section -->
    <div id="board-section" style="display:none;">

        <h3 id="board-title"></h3>

        <div id="chat-area"></div>
        
        <!--input area-->
        <div class="input-area">
            <textarea id="message-input" placeholder="Type your message..."></textarea>
            <button id="submit-btn" onclick="submitMessage()">Submit</button>
        </div>
    </div>

    <!-- Back button -->
    <div class="back-buttons">
        <button class="feature-btn" onclick="backToCategory()">Back to Category</button>
    <a href="/" class="feature-btn">Back to Home</a>
    </div>

</div>

<script src="{{ url_for('static', filename='js/community.js') }}"></script>

</body>
</html>

<!-- Community Page created by Aki-->
<!DOCTYPE html>
<html>
<head>
    <title>Community Forum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<!-- Top bar -->
<div class="top-bar">
    <a href="/" class="top-btn">LOGO</a>
    <a href="/login" class="top-btn">LOGIN</a>
</div>

<!-- Page header -->
<div class="page-header">
    <h1>COMMUNITY CHANNEL</h1>
</div>

<!-- Main layout -->
<div class="community-layout">

    <!-- Categories column -->
    <div class="categories-box">
        <h2 class="cat-title">CATEGORIES</h2>

        <div class="category-btn"><p>CAT. 1</p></div>
        <div class="category-btn"><p>CAT. 2</p></div>
        <div class="category-btn"><p>CAT. 3</p></div>
        <div class="category-btn"><p>CAT. 4</p></div>
    </div>

    <!-- Messages column -->
    <div class="messages-box">

        <div class="chat-placeholder user-msg">
            <p class="msg-label">USER</p>
            <div class="placeholder-line"></div>
            <div class="placeholder-line"></div>
            <div class="placeholder-line short"></div>
        </div>

        <div class="chat-placeholder bot-msg">
            <p class="msg-label">OTHER USER</p>
            <div class="placeholder-line"></div>
            <div class="placeholder-line"></div>
            <div class="placeholder-line short"></div>
        </div>

        <div class="chat-placeholder user-msg">
            <p class="msg-label">USER</p>
            <div class="placeholder-line"></div>
            <div class="placeholder-line"></div>
            <div class="placeholder-line short"></div>
        </div>

        <!-- Typing box -->
        <div class="typing-placeholder">
            <p>Type your message...</p>
        </div>

        <!-- Send message -->
        <div class="send-placeholder">
            <p>SEND MESSAGE</p>
        </div>

    </div>

</div>

<a href="/" class="feature-btn">Back to Home</a>

</body>
</html>

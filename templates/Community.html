<!-- Community Page created by Aki -->
<!DOCTYPE html>
<html>
<head>
    <title>Community Forum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <h1>COMMUNITY CHANNEL</h1>
    </div>

    <!-- NEW mobile-friendly two-column layout -->
    <div class="community-mobile">

        <!-- Left sidebar -->
        <div class="community-sidebar">
            <h2 class="cat-title">CATEGORIES</h2>

            <div class="category-btn"><p>CAT. 1</p></div>
            <div class="category-btn"><p>CAT. 2</p></div>
            <div class="category-btn"><p>CAT. 3</p></div>
            <div class="category-btn"><p>CAT. 4</p></div>
        </div>


        <!-- Right message area -->
        <div class="community-messages">

            <div class="chat-placeholder user-msg">
                <p class="msg-label">USER</p>
                <div class="placeholder-line"></div>
                <div class="placeholder-line"></div>
                <div class="placeholder-line short"></div>
            </div>

            <div class="chat-placeholder bot-msg">
                <p class="msg-label">OTHER USER</p>
                <div class="placeholder-line"></div>
                <div class="placeholder-line"></div>
                <div class="placeholder-line short"></div>
            </div>

            <!-- Typing + Submit -->
            <textarea class="typing-box" placeholder="Type your message..."></textarea>

            <div class="send-placeholder">
                <p>SUBMIT ANSWER</p>
            </div>

        </div>

    </div>

    <!-- Back button -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>

</body>
</html>

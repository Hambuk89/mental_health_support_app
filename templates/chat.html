<!-- Mood Page created by Aki -->
<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<!-- Top bar -->
<div class="top-bar">
    <a href="/" class="top-btn">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
    </a>
    <a href="/login" class="top-btn">LOGIN</a>
</div>

<!-- Chat header -->
<div class="page-header">
    <h1>CHAT</h1>
</div>

<!-- USER message placeholder -->
<div class="chat-placeholder user-msg">
    <p class="msg-label">USER</p>
    <div class="placeholder-line"></div>
    <div class="placeholder-line"></div>
    <div class="placeholder-line short"></div>
</div>

<!-- BOT message placeholder -->
<div class="chat-placeholder bot-msg">
    <p class="msg-label">BOT / AGENT</p>
    <div class="placeholder-line"></div>
    <div class="placeholder-line"></div>
    <div class="placeholder-line short"></div>
</div>

<!-- USER message placeholder -->
<div class="chat-placeholder user-msg">
    <p class="msg-label">USER</p>
    <div class="placeholder-line"></div>
    <div class="placeholder-line"></div>
    <div class="placeholder-line short"></div>
</div>

<!-- Typing box placeholder -->
<div class="typing-placeholder">
    <p>Type your message...</p>
</div>

<!-- Send message placeholder -->
<div class="send-placeholder">
    <p>SEND MESSAGE</p>
</div>

<a href="/" class="feature-btn">Back to Home</a>

</body>
</html>

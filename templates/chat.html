<!-- Chat Page created by Aki -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Chat header -->
    <div class="page-header">
        <h1>CHAT</h1>
    </div>

    <!-- USER message placeholder -->
    <div class="chat-placeholder user-msg">
        <p class="msg-label">USER</p>
        <div class="placeholder-line"></div>
        <div class="placeholder-line"></div>
        <div class="placeholder-line short"></div>
    </div>

    <!-- BOT/AGENT message placeholder -->
    <div class="chat-placeholder bot-msg">
        <p class="msg-label">BOT / AGENT</p>
        <div class="placeholder-line"></div>
        <div class="placeholder-line"></div>
        <div class="placeholder-line short"></div>
    </div>

    <!-- Typing + Submit -->
    <textarea class="typing-box1" placeholder="Type your message..."></textarea>

    <div class="send-placeholder1">
        <p>SUBMIT ANSWER</p>
    </div>

    <!-- Back button -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>

</body>
</html>

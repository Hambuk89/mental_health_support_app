<!-- Chat Page created by Aki -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Chat header -->
    <div class="page-header">
        <h1>CHAT</h1>
        <h2 class="chat-subtitle">A Safe space to share your thoughts and receive supportive guidance.</h2>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chat-container">
        <!-- messages will be added here via Java -->
    </div>

    <!-- Type message and submit -->
    <textarea class="typing-box1" id="chat-input" placeholder="Type your message..."></textarea>

    <div class="send-placeholder1" id="send-btn">
        <p>Send</p>
    </div>

    <!-- Back button -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>

<!-- Q&A Forum Page created by Aki -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Forum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-bg">

<div class="mobile-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/" class="top-btn">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo-img">
        </a>
        <a href="/login" class="top-btn">LOGIN</a>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <h1>Q&A FORUM</h1>
    </div>

    <!-- Two-column layout (matching Community) -->
    <div class="community-mobile">

        <!-- Left sidebar (QUESTIONS) -->
        <div class="community-sidebar">
            <h2 class="cat-title">QUESTIONS</h2>

            <div class="category-btn"><p>Q1</p></div>
            <div class="category-btn"><p>Q2</p></div>
            <div class="category-btn"><p>Q3</p></div>

            <div class="category-btn"><p>POST A Q</p></div>
        </div>

        <!-- Right message area (Selected question + answers) -->
        <div class="community-messages">

            <!-- Selected question -->
            <div class="chat-placeholder user-msg">
                <p class="msg-label">SELECTED QUESTION</p>
                <div class="placeholder-line"></div>
                <div class="placeholder-line"></div>
                <div class="placeholder-line short"></div>
            </div>

            <!-- Answers -->
            <div class="chat-placeholder user-msg">
                <p class="msg-label">USER ANSWER</p>
                <div class="placeholder-line"></div>
                <div class="placeholder-line short"></div>
            </div>

            <!-- Typing + Submit -->
            <textarea class="typing-box" placeholder="Type your answer..."></textarea>

            <div class="send-placeholder">
                <p>SUBMIT ANSWER</p>
            </div>

        </div>

    </div>

    <!-- Back button -->
    <a href="/" class="feature-btn">Back to Home</a>

</div>

</body>
</html>
